<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h2> TO-DO list</h2>
        </header>
        <section class="input">
         <input type="text" id="task input" placeholder="study html basics" aria-lable="Newtask">
         <button id="addtaskbutton">"study css"</button>
        </section>
        <nav class="filter.controls">
            <button class="filter_button active" data filter ="all">All</button> 
            <button class="filter_button active" data filter ="pending">pending</button>
            <button class="filter_button active" data filter ="incomplete">incomplete</button>
        </nav>
        <ul id="taskList">
        </ul>

    </div>
    <script src="script.js"></script>
    
</body>
</html>
